<!DOCTYPE html>
<html lang="cs">
<head>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            color: white;

            background: url('./img1.png') no-repeat center center fixed;
            background-size: cover;
        }

        /* menu */
        nav {
    position: relative;   /* důležité */
    z-index: 2;           /* vyšší než overlay */
    background: rgba(0,0,0,0.8);
    padding: 15px;
    text-align: right;
}

        nav a {
            color: white;
            margin-left: 20px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .overlay {
            position: fixed;
            top: 15px;
	    margin-top: 15px;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7);

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;

            z-index: 1;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 20px;
        }

        ul {
            list-style: none;
            padding: 0;
            font-size: 1.5em;
        }

        li {
            margin: 10px 0;
        }
    </style>
</head>
<body>

        <a href="index.html">Domů</a>
